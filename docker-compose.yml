version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=sqlite:data/app.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - AI_SERVICE_URL=http://ai-service:8001
      - HOST=0.0.0.0
      - PORT=3000
      - MEDIA_DIR=./media
    volumes:
      - ./data:/app/data
      - ./media:/app/media
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
    restart: unless-stopped
